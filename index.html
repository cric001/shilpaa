<style>

  @keyframes glow {
    0% { box-shadow: 0 0 10px #00f2ff; }

    animation: glow 2s infinite, pulse 2s infinite;

  }

<div class="min-h-screen flex items-center justify-center px-4">

  <div class="bg-gradient-to-br from-blue-900/40 to-black/80 backdrop-blur-lg p-6 rounded-2xl text-center max-w-md w-full border border-blue-500 shadow-xl">

<script>
let timeLeft = 30;
const countdownElement = document.getElementById('countdown');

setInterval(() => {
  countdownElement.textContent = timeLeft;
  timeLeft--;

  if (timeLeft < 0) {
    timeLeft = 30;

}, 1000);
